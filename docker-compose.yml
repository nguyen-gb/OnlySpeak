x-api-environment: &api-environment
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the root .env file}
  SECRET_KEY: ${SECRET_KEY:?Set a random SECRET_KEY of at least 32 characters}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-false}
  CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000"]}'
  COOKIE_SECURE: ${COOKIE_SECURE:-false}
  COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
  REFRESH_REUSE_GRACE_SECONDS: ${REFRESH_REUSE_GRACE_SECONDS:-10}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
  TTS_LINE_TIMEOUT_SECONDS: ${TTS_LINE_TIMEOUT_SECONDS:-30}
  TTS_BATCH_TIMEOUT_SECONDS: ${TTS_BATCH_TIMEOUT_SECONDS:-120}
  TTS_CONCURRENCY: ${TTS_CONCURRENCY:-4}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onlyspeak}
      POSTGRES_USER: ${POSTGRES_USER:-onlyspeak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the root .env file}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    restart: "no"
    environment: *api-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *api-environment
    volumes:
      - audio_data:/app/static/audio
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  audio_data:
