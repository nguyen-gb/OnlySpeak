name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: onlyspeak
          POSTGRES_USER: onlyspeak
          POSTGRES_PASSWORD: onlyspeak
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onlyspeak -d onlyspeak"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      ONLYSPEAK_ENVIRONMENT: test
      ONLYSPEAK_SECRET_KEY: ci-only-secret-value-with-at-least-32-characters
      ONLYSPEAK_DATABASE_URL: postgresql+asyncpg://onlyspeak:onlyspeak@localhost:5432/onlyspeak
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install --requirement requirements-dev.txt
      - run: pytest -q
      - run: python -m compileall -q app
      - run: alembic upgrade head
      - run: alembic check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client.apps.googleusercontent.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run typecheck
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag onlyspeak-backend-ci backend
      - run: >-
          docker build
          --build-arg NEXT_PUBLIC_API_URL=http://localhost:5000
          --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=test-client.apps.googleusercontent.com
          --tag onlyspeak-web-ci
          web
